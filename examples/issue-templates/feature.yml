name: Feature Request
description: Suggest a new capability or improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the feature request.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain the problem this feature would solve.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional Details
      description: Add any mockups, examples, or constraints.
    validations:
      required: false
