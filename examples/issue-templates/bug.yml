name: Bug Report
description: Report a reproducible problem.
title: "[bug] "
labels:
  - BUG
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, app version, runtime, or any other environment details.
      placeholder: Windows 11 / App 1.2.3 / .NET 8
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |-
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what should have happened instead.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened. Logs and screenshots can be included here.
    validations:
      required: false
