name: Repo Bot Consumer

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

jobs:
  repo-bot:
    uses: your-org/bettergi-github-bot/.github/workflows/repo-bot.yml@v1
    permissions:
      issues: write
      contents: read
    secrets:
      REPO_BOT_AI_API_KEY: ${{ secrets.REPO_BOT_AI_API_KEY }}
    with:
      config-path: .github/repo-bot.yml
      config-overrides-json: ${{ vars.REPO_BOT_CONFIG_OVERRIDES_JSON }}
      ai-base-url: ${{ vars.REPO_BOT_AI_BASE_URL }}
