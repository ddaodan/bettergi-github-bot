name: Repo Bot

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to the repo bot configuration file.
        required: false
        type: string
        default: .github/repo-bot.yml
      config-overrides-json:
        description: JSON string used to override the YAML configuration.
        required: false
        type: string
        default: ""
      ai-base-url:
        description: AI provider base URL passed through as an environment variable.
        required: false
        type: string
        default: ""
      github-app-id:
        description: GitHub App ID used to mint an installation token for bot operations.
        required: false
        type: string
        default: ""
      dry-run:
        description: When true, the bot will not mutate GitHub state.
        required: false
        type: boolean
        default: false
    secrets:
      REPO_BOT_GITHUB_APP_PRIVATE_KEY:
        required: false
      REPO_BOT_AI_API_KEY:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Resolve repo bot source
        id: bot-source
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          repository="${WORKFLOW_REF%%/.github/workflows/*}"
          ref="${WORKFLOW_REF#*@}"

          if [ -z "$repository" ] || [ "$repository" = "$WORKFLOW_REF" ]; then
            echo "Unable to resolve reusable workflow repository from github.workflow_ref=$WORKFLOW_REF" >&2
            exit 1
          fi

          if [ -z "$ref" ] || [ "$ref" = "$WORKFLOW_REF" ]; then
            echo "Unable to resolve reusable workflow ref from github.workflow_ref=$WORKFLOW_REF" >&2
            exit 1
          fi

          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Detect GitHub App configuration
        id: auth-mode
        shell: bash
        env:
          REPO_BOT_GITHUB_APP_ID: ${{ inputs.github-app-id }}
          REPO_BOT_GITHUB_APP_PRIVATE_KEY: ${{ secrets.REPO_BOT_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$REPO_BOT_GITHUB_APP_ID" ] && [ -n "$REPO_BOT_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout caller repository
        uses: actions/checkout@v4
      - name: Checkout repo bot repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.bot-source.outputs.repository }}
          ref: ${{ steps.bot-source.outputs.ref }}
          path: .repo-bot
      - name: Create GitHub App token
        if: ${{ steps.auth-mode.outputs.use_app == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.github-app-id }}
          private-key: ${{ secrets.REPO_BOT_GITHUB_APP_PRIVATE_KEY }}
      - name: Run Repo Bot
        uses: ./.repo-bot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_BOT_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_BOT_AI_API_KEY: ${{ secrets.REPO_BOT_AI_API_KEY }}
          REPO_BOT_AI_BASE_URL: ${{ inputs.ai-base-url }}
        with:
          config-path: ${{ inputs.config-path }}
          config-overrides-json: ${{ inputs.config-overrides-json }}
          dry-run: ${{ inputs.dry-run }}
