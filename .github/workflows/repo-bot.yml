name: Repo Bot

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to the repo bot configuration file.
        required: false
        type: string
        default: .github/repo-bot.yml
      config-overrides-json:
        description: JSON string used to override the YAML configuration.
        required: false
        type: string
        default: ""
      ai-base-url:
        description: AI provider base URL passed through as an environment variable.
        required: false
        type: string
        default: ""
      ai-enabled:
        description: Whether the AI provider is enabled.
        required: false
        type: string
        default: ""
      ai-model:
        description: AI provider model passed through as an environment variable.
        required: false
        type: string
        default: ""
      ai-api-style:
        description: "AI provider API style: auto, responses, or chat_completions."
        required: false
        type: string
        default: ""
      ai-timeout-ms:
        description: AI provider request timeout in milliseconds.
        required: false
        type: string
        default: ""
      action-repository:
        description: Repository containing the Repo Bot action.
        required: false
        type: string
        default: ddaodan/bettergi-github-bot
      action-ref:
        description: Git ref containing the Repo Bot action.
        required: false
        type: string
        default: main
      github-app-id:
        description: GitHub App ID used to mint an installation token for bot operations.
        required: false
        type: string
        default: ""
      dry-run:
        description: When true, the bot will not mutate GitHub state.
        required: false
        type: boolean
        default: false
    secrets:
      REPO_BOT_GITHUB_APP_PRIVATE_KEY:
        required: false
      REPO_BOT_AI_API_KEY:
        required: false

jobs:
  run:
    if: >-
      github.event.sender.type != 'Bot' &&
      (
        github.event_name != 'issue_comment' ||
        contains(github.event.comment.body, '/fix') ||
        contains(github.event.comment.body, '/refresh')
      )
    name: "Repo Bot (${{ github.event_name }}/${{ github.event.action }})"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Detect GitHub App configuration
        id: auth-mode
        shell: bash
        env:
          REPO_BOT_GITHUB_APP_ID: ${{ inputs.github-app-id }}
          REPO_BOT_GITHUB_APP_PRIVATE_KEY: ${{ secrets.REPO_BOT_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$REPO_BOT_GITHUB_APP_ID" ] && [ -n "$REPO_BOT_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout caller repository
        uses: actions/checkout@v4
      - name: Checkout repo bot repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository }}
          ref: ${{ inputs.action-ref }}
          path: .repo-bot
      - name: Create GitHub App token
        if: ${{ steps.auth-mode.outputs.use_app == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.github-app-id }}
          private-key: ${{ secrets.REPO_BOT_GITHUB_APP_PRIVATE_KEY }}
      - name: Run Repo Bot
        uses: ./.repo-bot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_BOT_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_BOT_AI_API_KEY: ${{ secrets.REPO_BOT_AI_API_KEY }}
          REPO_BOT_CONFIG_OVERRIDES_JSON: ${{ inputs.config-overrides-json }}
          REPO_BOT_RUNTIME_LANGUAGE_MODE: ${{ vars.REPO_BOT_RUNTIME_LANGUAGE_MODE }}
          REPO_BOT_RUNTIME_DRY_RUN: ${{ vars.REPO_BOT_RUNTIME_DRY_RUN }}
          REPO_BOT_AI_ENABLED: ${{ inputs.ai-enabled || vars.REPO_BOT_AI_ENABLED }}
          REPO_BOT_AI_BASE_URL: ${{ inputs.ai-base-url || vars.REPO_BOT_AI_BASE_URL }}
          REPO_BOT_AI_MODEL: ${{ inputs.ai-model || vars.REPO_BOT_AI_MODEL }}
          REPO_BOT_AI_API_STYLE: ${{ inputs.ai-api-style || vars.REPO_BOT_AI_API_STYLE }}
          REPO_BOT_AI_TIMEOUT_MS: ${{ inputs.ai-timeout-ms || vars.REPO_BOT_AI_TIMEOUT_MS }}
          REPO_BOT_ISSUES_AUTO_PROCESSING_SKIP_CREATED_BEFORE: ${{ vars.REPO_BOT_ISSUES_AUTO_PROCESSING_SKIP_CREATED_BEFORE }}
          REPO_BOT_ISSUES_TITLE_GENERATION_ENABLED: ${{ vars.REPO_BOT_ISSUES_TITLE_GENERATION_ENABLED }}
          REPO_BOT_ISSUES_TITLE_GENERATION_MAX_LENGTH: ${{ vars.REPO_BOT_ISSUES_TITLE_GENERATION_MAX_LENGTH }}
          REPO_BOT_ISSUES_TITLE_GENERATION_DETECT_MISMATCH: ${{ vars.REPO_BOT_ISSUES_TITLE_GENERATION_DETECT_MISMATCH }}
          REPO_BOT_ISSUES_TITLE_GENERATION_MISMATCH_CONFIDENCE: ${{ vars.REPO_BOT_ISSUES_TITLE_GENERATION_MISMATCH_CONFIDENCE }}
          REPO_BOT_ISSUES_TITLE_GENERATION_PLACEHOLDER_TITLES: ${{ vars.REPO_BOT_ISSUES_TITLE_GENERATION_PLACEHOLDER_TITLES }}
          REPO_BOT_ISSUES_VALIDATION_ENABLED: ${{ vars.REPO_BOT_ISSUES_VALIDATION_ENABLED }}
          REPO_BOT_ISSUES_VALIDATION_FALLBACK_TEMPLATE_KEY: ${{ vars.REPO_BOT_ISSUES_VALIDATION_FALLBACK_TEMPLATE_KEY }}
          REPO_BOT_ISSUES_VALIDATION_COMMENT_ANCHOR: ${{ vars.REPO_BOT_ISSUES_VALIDATION_COMMENT_ANCHOR }}
          REPO_BOT_ISSUES_VALIDATION_TEMPLATES: ${{ vars.REPO_BOT_ISSUES_VALIDATION_TEMPLATES }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_ENABLED: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_ENABLED }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_BYPASS_LABELS: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_BYPASS_LABELS }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_DUPLICATE_LABEL: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_DUPLICATE_LABEL }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SEARCH_RESULT_LIMIT: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SEARCH_RESULT_LIMIT }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_CANDIDATE_LIMIT: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_CANDIDATE_LIMIT }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_AI_REVIEW_MAX_CANDIDATES: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_AI_REVIEW_MAX_CANDIDATES }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_EXACT: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_EXACT }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_HIGH_CONFIDENCE: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_HIGH_CONFIDENCE }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_REVIEW_MIN: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_THRESHOLDS_REVIEW_MIN }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_ENABLED: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_ENABLED }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_COMMENT_ANCHOR: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_COMMENT_ANCHOR }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_MIN_SCORE: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_MIN_SCORE }}
          REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_MAX_CANDIDATES: ${{ vars.REPO_BOT_ISSUES_VALIDATION_DUPLICATE_DETECTION_SIMILARITY_COMMENT_MAX_CANDIDATES }}
          REPO_BOT_ISSUES_LABELING_ENABLED: ${{ vars.REPO_BOT_ISSUES_LABELING_ENABLED }}
          REPO_BOT_ISSUES_LABELING_AUTO_CREATE_MISSING: ${{ vars.REPO_BOT_ISSUES_LABELING_AUTO_CREATE_MISSING }}
          REPO_BOT_ISSUES_LABELING_MANAGED: ${{ vars.REPO_BOT_ISSUES_LABELING_MANAGED }}
          REPO_BOT_ISSUES_LABELING_DEFINITIONS: ${{ vars.REPO_BOT_ISSUES_LABELING_DEFINITIONS }}
          REPO_BOT_ISSUES_LABELING_KEYWORD_RULES: ${{ vars.REPO_BOT_ISSUES_LABELING_KEYWORD_RULES }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_ENABLED: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_ENABLED }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_MAX_LABELS: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_MAX_LABELS }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_MIN_CONFIDENCE: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_MIN_CONFIDENCE }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_INCLUDE: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_INCLUDE }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_EXCLUDE: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_EXCLUDE }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_PROMPT: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_PROMPT }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_SOURCE_REPOSITORY_OWNER: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_SOURCE_REPOSITORY_OWNER }}
          REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_SOURCE_REPOSITORY_REPO: ${{ vars.REPO_BOT_ISSUES_LABELING_AI_CLASSIFICATION_SOURCE_REPOSITORY_REPO }}
          REPO_BOT_ISSUES_AI_HELP_ENABLED: ${{ vars.REPO_BOT_ISSUES_AI_HELP_ENABLED }}
          REPO_BOT_ISSUES_AI_HELP_TRIGGER_LABELS: ${{ vars.REPO_BOT_ISSUES_AI_HELP_TRIGGER_LABELS }}
          REPO_BOT_ISSUES_AI_HELP_COMMENT_ANCHOR: ${{ vars.REPO_BOT_ISSUES_AI_HELP_COMMENT_ANCHOR }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_ENABLED: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_ENABLED }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_INCLUDE_REPOSITORY_METADATA: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_INCLUDE_REPOSITORY_METADATA }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_INCLUDE_README: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_INCLUDE_README }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_README_MAX_CHARS: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_README_MAX_CHARS }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_NAME: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_NAME }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_ALIASES: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_ALIASES }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_SUMMARY: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_SUMMARY }}
          REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_TECH_STACK: ${{ vars.REPO_BOT_ISSUES_AI_HELP_PROJECT_CONTEXT_PROFILE_TECH_STACK }}
          REPO_BOT_ISSUES_COMMANDS_ENABLED: ${{ vars.REPO_BOT_ISSUES_COMMANDS_ENABLED }}
          REPO_BOT_ISSUES_COMMANDS_MENTIONS: ${{ vars.REPO_BOT_ISSUES_COMMANDS_MENTIONS }}
          REPO_BOT_ISSUES_COMMANDS_ACCESS: ${{ vars.REPO_BOT_ISSUES_COMMANDS_ACCESS }}
          REPO_BOT_ISSUES_COMMANDS_FIX_ENABLED: ${{ vars.REPO_BOT_ISSUES_COMMANDS_FIX_ENABLED }}
          REPO_BOT_ISSUES_COMMANDS_FIX_COMMENT_ANCHOR: ${{ vars.REPO_BOT_ISSUES_COMMANDS_FIX_COMMENT_ANCHOR }}
          REPO_BOT_ISSUES_COMMANDS_REFRESH_ENABLED: ${{ vars.REPO_BOT_ISSUES_COMMANDS_REFRESH_ENABLED }}
          REPO_BOT_PULL_REQUESTS_REVIEW_ENABLED: ${{ vars.REPO_BOT_PULL_REQUESTS_REVIEW_ENABLED }}
          REPO_BOT_PULL_REQUESTS_LABELING_ENABLED: ${{ vars.REPO_BOT_PULL_REQUESTS_LABELING_ENABLED }}
          REPO_BOT_PULL_REQUESTS_SUMMARY_ENABLED: ${{ vars.REPO_BOT_PULL_REQUESTS_SUMMARY_ENABLED }}
        with:
          config-path: ${{ inputs.config-path }}
          config-overrides-json: ${{ inputs.config-overrides-json }}
          dry-run: ${{ inputs.dry-run }}
