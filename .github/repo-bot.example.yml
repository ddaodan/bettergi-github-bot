runtime:
  languageMode: auto
  dryRun: false

providers:
  openAiCompatible:
    enabled: false
    baseUrl: https://api.openai.com/v1
    model: gpt-5.4
    apiStyle: auto
    timeoutMs: 30000

issues:
  validation:
    enabled: true
    fallbackTemplateKey: bug
    commentAnchor: issue-bot:validation
    templates:
      - key: bug
        detect:
          markers:
            - bug
          titlePrefixes:
            - "[bug]"
        requiredSections:
          - id: environment
            aliases:
              - Environment
          - id: steps
            aliases:
              - Steps to Reproduce
          - id: expected
            aliases:
              - Expected Behavior
        labels:
          whenValid:
            - BUG
          whenInvalid:
            - 需要更多信息
      - key: feature
        detect:
          markers:
            - feature
          titlePrefixes:
            - "[feature]"
        requiredSections:
          - id: summary
            aliases:
              - Summary
          - id: motivation
            aliases:
              - Motivation
        labels:
          whenValid:
            - 功能建议
          whenInvalid:
            - 需要更多信息
      - key: question
        detect:
          markers:
            - question
          titlePrefixes:
            - "[question]"
        requiredSections:
          - id: summary
            aliases:
              - Question
        labels:
          whenValid:
            - 问题咨询
          whenInvalid:
            - 需要更多信息
    duplicateDetection:
      enabled: true
      bypassLabels:
        - 跳过重复检测
      duplicateLabel: 重复
      searchResultLimit: 50
      candidateLimit: 20
      aiReviewMaxCandidates: 3
      thresholds:
        exact: 0.995
        highConfidence: 0.93
        reviewMin: 0.82
      similarityComment:
        enabled: true
        commentAnchor: issue-bot:similar-issues
        minScore: 0.3
        maxCandidates: 3
  labeling:
    enabled: true
    autoCreateMissing: true
    managed:
      - BUG
      - 功能建议
      - 问题咨询
      - 需要更多信息
      - 重复
      - 需要 AI 分析
    definitions:
      BUG:
        color: d73a4a
        description: 缺陷反馈。
      功能建议:
        color: a2eeef
        description: 功能建议或改进请求。
      问题咨询:
        color: 7057ff
        description: 使用问题或咨询。
      需要更多信息:
        color: fbca04
        description: Issue 缺少必要信息。
      重复:
        color: cfd3d7
        description: 已存在相同或高度相似的问题。
      需要 AI 分析:
        color: 0e8a16
        description: 已满足 AI 辅助分析条件。
    keywordRules:
      - keywords:
          - crash
        labels:
          - 需要 AI 分析
        fields:
          - title
          - body
        caseSensitive: false
    aiClassification:
      enabled: false
      maxLabels: 3
      minConfidence: 0.65
      include: []
      exclude:
        - 重复
      prompt: 优先选择和具体功能模块、子系统或使用场景直接相关的标签，避免只选择流程状态标签。
      sourceRepository:
        owner: babalae
        repo: better-genshin-impact
  aiHelp:
    enabled: false
    triggerLabels:
      - 需要 AI 分析
    commentAnchor: issue-bot:ai
    projectContext:
      enabled: true
      includeRepositoryMetadata: true
      includeReadme: true
      readmeMaxChars: 3000
      profile:
        name: BetterGI
        aliases:
          - BGI
          - Better Genshin Impact
        summary: Desktop automation assistant for Genshin Impact.
        techStack:
          - C#
          - WPF
          - .NET
  commands:
    enabled: false
    mentions:
      - "@bot"
    access: collaborators
    fix:
      enabled: false
      commentAnchor: issue-bot:fix
    refresh:
      enabled: false

pullRequests:
  review:
    enabled: false
  labeling:
    enabled: false
  summary:
    enabled: false
